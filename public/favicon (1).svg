<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 100 100" width="100" height="100">
  <rect width="100" height="100" rx="0" fill="#141210"/>
  <circle cx="50" cy="50" r="46" fill="none" stroke="#C9A96E" stroke-width="0.8" opacity="0.5"/>
  <circle cx="50" cy="50" r="39" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.2"/>
  <!-- 4 main diamonds -->
  <polygon points="50,4 52.5,8 50,12 47.5,8" fill="#C9A96E" opacity="0.9"/>
  <polygon points="50,96 52.5,92 50,88 47.5,92" fill="#C9A96E" opacity="0.9"/>
  <polygon points="4,50 8,52.5 12,50 8,47.5" fill="#C9A96E" opacity="0.9"/>
  <polygon points="96,50 92,52.5 88,50 92,47.5" fill="#C9A96E" opacity="0.9"/>
  <!-- 4 diagonal diamonds -->
  <polygon points="18,18 21,22 18,25 15,22" fill="#C9A96E" opacity="0.55" transform="rotate(45,18,18)"/>
  <polygon points="82,18 85,22 82,25 79,22" fill="#C9A96E" opacity="0.55" transform="rotate(45,82,18)"/>
  <polygon points="18,82 21,86 18,89 15,86" fill="#C9A96E" opacity="0.55" transform="rotate(45,18,82)"/>
  <polygon points="82,82 85,86 82,89 79,86" fill="#C9A96E" opacity="0.55" transform="rotate(45,82,82)"/>
  <!-- arc connectors -->
  <path d="M50,4 Q18,10 18,18" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M50,4 Q82,10 82,18" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M50,96 Q18,90 18,82" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M50,96 Q82,90 82,82" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M4,50 Q10,18 18,18" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M4,50 Q10,82 18,82" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M96,50 Q90,18 82,18" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <path d="M96,50 Q90,82 82,82" fill="none" stroke="#C9A96E" stroke-width="0.4" opacity="0.3"/>
  <!-- L letter -->
  <text x="50" y="68" text-anchor="middle" font-family="Georgia, 'Times New Roman', serif" font-style="italic" font-size="60" font-weight="400" fill="#C9A96E">L</text>
  <!-- underline ornament -->
  <line x1="34" y1="74" x2="66" y2="74" stroke="#C9A96E" stroke-width="0.7" opacity="0.5"/>
  <circle cx="34" cy="74" r="1.5" fill="#C9A96E" opacity="0.6"/>
  <circle cx="66" cy="74" r="1.5" fill="#C9A96E" opacity="0.6"/>
</svg>
